<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogiFix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F4F6F9;
      color: #1A1A2E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #FFFFFF;
      border-bottom: 1px solid #E2E8F0;
      padding: 0 32px;
      height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 38px;
      height: 38px;
      background: #1A56DB;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }
    .logo-name {
      font-family: 'Sora', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1E3A5F;
      display: block;
      line-height: 1.2;
    }
    .logo-tagline {
      font-size: 0.7rem;
      color: #718096;
      display: block;
      margin-top: 1px;
    }
    .live-badge {
      font-size: 0.68rem;
      font-weight: 600;
      color: #2F855A;
      background: #F0FFF4;
      border: 1px solid #C6F6D5;
      border-radius: 20px;
      padding: 4px 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .main {
      flex: 1;
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .chat-card {
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .chat-box {
      padding: 24px;
      min-height: 500px;
      max-height: 640px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    .chat-box::-webkit-scrollbar { width: 5px; }
    .chat-box::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    .msg { display: flex; align-items: flex-start; gap: 12px; animation: rise 0.2s ease; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 600;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .av-bot { background: #EBF4FF; color: #1A56DB; border: 1px solid #BEE3F8; }
    .av-user { background: #EDF2F7; color: #4A5568; border: 1px solid #E2E8F0; }
    .bubble {
      max-width: 75%;
      padding: 16px 20px;
      border-radius: 18px;
      font-size: 1.08rem;
      line-height: 1.85;
    }
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble-sender {
      font-size: 0.65rem !important;
      font-weight: 600;
      color: #1A56DB !important;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 5px !important;
    }
    .bub-bot {
      background: #EBF4FF;
      color: #1A1A2E;
      border: 1px solid #BEE3F8;
      border-top-left-radius: 4px;
    }
    .bub-user {
      background: #1A56DB;
      color: #FFFFFF;
      border-top-right-radius: 4px;
    }
    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-top: 1px solid #F7FAFC;
      background: #FAFAFA;
    }
    .dots { display: flex; gap: 5px; }
    .dots span {
      width: 7px; height: 7px;
      background: #1A56DB;
      border-radius: 50%;
      animation: bounce 1.1s infinite;
      opacity: 0.35;
    }
    .dots span:nth-child(2) { animation-delay: 0.18s; }
    .dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.35; transform: translateY(0); }
      40%            { opacity: 1;    transform: translateY(-5px); }
    }
    .loading-text { font-size: 0.8rem; color: #718096; font-style: italic; }
    .msg-time {
      display: block;
      font-size: 0.6rem;
      color: #A0AEC0;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }
    .bub-user .msg-time { color: rgba(255,255,255,0.6); }
    .input-area { display: flex; border-top: 1px solid #E2E8F0; }
    #imageInput { display: none; }
    .attach-btn {
      background: #F7FAFC;
      border: none;
      border-right: 1px solid #E2E8F0;
      padding: 0 14px;
      color: #718096;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .attach-btn:hover:not(:disabled) { background: #EBF4FF; color: #1A56DB; }
    .attach-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .image-preview {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 6px 18px;
      background: #EBF4FF;
      border-top: 1px solid #BEE3F8;
      font-size: 0.72rem;
      color: #2B6CB0;
    }
    .image-preview.visible { display: flex; }
    .preview-clear {
      background: none;
      border: none;
      color: #E53E3E;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      margin-left: auto;
    }
    textarea#userInput {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: #1A1A2E;
      background: #FFFFFF;
      border: none;
      outline: none;
      padding: 18px 20px;
      resize: none;
      line-height: 1.6;
      min-height: 62px;
    }
    textarea#userInput::placeholder { color: #CBD5E0; }
    textarea#userInput:disabled { background: #F7FAFC; cursor: not-allowed; }
    .send-btn {
      background: #1A56DB;
      color: #FFFFFF;
      border: none;
      padding: 0 26px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      min-width: 88px;
    }
    .send-btn:hover:not(:disabled) { background: #1E3A8A; }
    .send-btn:disabled { background: #CBD5E0; cursor: not-allowed; }
    .topics-card {
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      border-radius: 18px;
      padding: 20px 22px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .topics-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .topics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .topic-btn {
      display: flex;
      align-items: center;
      gap: 11px;
      background: #F7FAFC;
      color: #2D3748;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 13px 15px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.3;
    }
    .topic-btn:hover { background: #EBF4FF; border-color: #BEE3F8; color: #1E3A8A; }
    .topic-btn:hover .t-icon { background: #BEE3F8; color: #1A56DB; }
    .t-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #E2E8F0;
      color: #718096;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    @media (max-width: 540px) {
      .header { padding: 0 16px; }
      .main { padding: 16px 12px 40px; }
      .topics-grid { grid-template-columns: 1fr; }
      .send-btn { min-width: 72px; padding: 0 16px; }
      .chat-box { max-height: 340px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">
      <div class="logo-mark">L</div>
      <div>
        <span class="logo-name">LogiFix</span>
        <span class="logo-tagline">Technology help, made simple</span>
      </div>
    </div>
    <div class="live-badge">Live</div>
  </header>

  <main class="main">

    <div class="chat-card">
      <div class="chat-box" id="chatBox">
        <div class="msg bot">
          <div class="avatar av-bot">LF</div>
          <div class="bubble bub-bot">
            <p class="bubble-sender">LogiFix Assistant</p>
            <p>Hello! I am here to help you with any technology questions you have.</p>
            <p>Type your question below, or choose a common topic to get started.</p>
          </div>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="dots"><span></span><span></span><span></span></div>
        <span class="loading-text">Finding an answer for you...</span>
      </div>

      <div class="image-preview" id="imagePreview">
        <span id="imagePreviewName"></span>
        <button class="preview-clear" onclick="clearImage()">✕ Remove</button>
      </div>
      <div class="input-area">
        <textarea id="userInput" placeholder="Type your question here..." rows="2" onkeydown="handleKey(event)"></textarea>
        <button class="attach-btn" id="attachBtn" title="Attach image" onclick="document.getElementById('imageInput').click()">📎</button>
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
        <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
      </div>
    </div>

    <div class="topics-card">
      <p class="topics-label">Common questions</p>
      <div class="topics-grid">
        <button class="topic-btn" onclick="ask('How do I connect to Wi-Fi?')">
          <span class="t-icon">Wi</span>Connect to Wi-Fi
        </button>
        <button class="topic-btn" onclick="ask('How do I send an email?')">
          <span class="t-icon">Em</span>Send an Email
        </button>
        <button class="topic-btn" onclick="ask('My computer is running slow. What should I do?')">
          <span class="t-icon">Sp</span>Speed Up Computer
        </button>
        <button class="topic-btn" onclick="ask('How do I video call someone?')">
          <span class="t-icon">Vc</span>Video Call Someone
        </button>
        <button class="topic-btn" onclick="ask('How do I take a screenshot?')">
          <span class="t-icon">Sc</span>Take a Screenshot
        </button>
        <button class="topic-btn" onclick="ask('How do I back up my photos?')">
          <span class="t-icon">Bu</span>Back Up Photos
        </button>
      </div>
    </div>

  </main>

  <script>
    const chatBox        = document.getElementById("chatBox");
    const userInput      = document.getElementById("userInput");
    const sendBtn        = document.getElementById("sendBtn");
    const attachBtn      = document.getElementById("attachBtn");
    const imageInput     = document.getElementById("imageInput");
    const imagePreview   = document.getElementById("imagePreview");
    const imagePreviewName = document.getElementById("imagePreviewName");
    const loading        = document.getElementById("loading");

    const conversationHistory = [];

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    }

    function ask(text) { userInput.value = text; send(); }

    function nowTime() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function handleImageSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      imagePreviewName.textContent = "📷 " + file.name;
      imagePreview.classList.add("visible");
    }

    function clearImage() {
      imageInput.value = "";
      imagePreview.classList.remove("visible");
      imagePreviewName.textContent = "";
    }

    function addMsg(text, who) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + who;

      const av = document.createElement("div");
      av.className = "avatar " + (who === "user" ? "av-user" : "av-bot");
      av.textContent = who === "user" ? "You" : "LF";

      const bub = document.createElement("div");
      bub.className = "bubble " + (who === "user" ? "bub-user" : "bub-bot");

      if (who === "bot") {
        const lbl = document.createElement("p");
        lbl.className = "bubble-sender";
        lbl.textContent = "LogiFix Assistant";
        bub.appendChild(lbl);
      }

      text.split("\n").filter(l => l.trim()).forEach(line => {
        const p = document.createElement("p");
        p.textContent = line;
        bub.appendChild(p);
      });

      const time = document.createElement("span");
      time.className = "msg-time";
      time.textContent = nowTime();
      bub.appendChild(time);

      wrap.appendChild(av);
      wrap.appendChild(bub);
      chatBox.appendChild(wrap);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function setLoading(on) {
      loading.style.display = on ? "flex" : "none";
      sendBtn.disabled   = on;
      attachBtn.disabled = on;
      userInput.disabled = on;
    }

    async function send() {
      const msg       = userInput.value.trim();
      const imageFile = imageInput.files[0];

      if (!msg && !imageFile) { userInput.focus(); return; }

      // Text shown in chat; fallback when only an image is sent
      const displayText = msg || "📷 Image shared";
      // Content stored in history (text only — image is handled server-side)
      const historyContent = msg || "Please help me with this image.";

      conversationHistory.push({ role: "user", content: historyContent });
      addMsg(displayText, "user");
      userInput.value = "";
      clearImage();
      setLoading(true);

      const formData = new FormData();
      formData.append("messages", JSON.stringify(conversationHistory));
      if (imageFile) {
        formData.append("image", imageFile);
      }

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          body: formData,  // browser sets Content-Type + boundary automatically
        });
        const data = await res.json();
        const reply = data.error
          ? "Sorry, something went wrong. Please try again."
          : data.reply;

        conversationHistory.push({ role: "assistant", content: reply });
        addMsg(reply, "bot");
      } catch {
        addMsg("Could not reach the server. Please try again in a moment.", "bot");
      } finally {
        setLoading(false);
        userInput.focus();
      }
    }
  </script>

</body>
</html>
